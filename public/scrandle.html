<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scrandle</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="home-link" href="/">upload</a>
      <a class="brand" href="/scrandle.html">scrandle</a>
    </header>

    <main class="scrandle-page">
      <section class="round" aria-labelledby="round-title">
        <div class="round-top">
          <div>
            <p class="kicker">Pick one</p>
            <h1 id="round-title">Which photo wins?</h1>
          </div>
          <button id="next-pair" class="secondary" type="button">Next pair</button>
        </div>

        <p id="battle-empty" class="empty-state">upload.</p>

        <div id="battle-cards" class="battle-cards" hidden>
          <button class="photo-card" id="left-card" type="button"></button>
          <button class="photo-card" id="right-card" type="button"></button>
        </div>

        <div id="round-result" class="round-result" hidden></div>
      </section>

      <section class="leaderboard-box" aria-labelledby="leaderboard-title">
        <div class="leaderboard-wrap">
          <div>
            <p class="kicker">leaderboard</p>
            <h2 id="leaderboard-title">MASQ win %</h2>
            <ol id="uploader-leaderboard"></ol>
          </div>
          <div class="leaderboard-image">
            <div class="leaderboard-image-box">
              <img src="/assets/himeangy.png" alt="angry face">
            </div>
            <div class="leaderboard-image-box">
              <img src="/assets/togif.png" alt="hamster">
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
